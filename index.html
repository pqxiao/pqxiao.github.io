<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pengqi Xiao (pqxiao)</title>
  <script>
    const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    document.documentElement.setAttribute('data-theme', savedTheme);
  </script>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <!-- Nav -->
  <nav>
    <div class="container nav-container">
      <div class="logo-text">PQ.Xiao</div>
      <div class="nav-actions">
        <div class="nav-links" id="nav-links-container">
        </div>
        <div class="nav-controls">
          <button id="lang-toggle" class="control-btn" aria-label="Toggle Language">EN</button>
          
          <a href="https://github.com/pqxiao" target="_blank" class="control-btn github-btn">
            <i class="fab fa-github"></i> <span class="gh-text">GitHub</span>
          </a>

          <button id="theme-toggle" class="control-btn theme-toggle" aria-label="Toggle Theme">
            <span class="sun-icon">🌞</span>
            <span class="moon-icon">🌙</span>
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <main class="container page-body">
    
    <!-- Profile -->
    <section id="about" class="section-row align-center pb-80">
      <div class="profile-header">
        <img src="assets/images/avatar.jpg" alt="PQ Xiao" class="avatar-large" onerror="this.src='https://via.placeholder.com/180'">
        <h1 class="name-title" data-i18n="profile.name"></h1>
        <h2 class="role-title" data-i18n="profile.role"></h2>
        
        <div id="profile-bio"></div>

        <div class="profile-details mt-20">
          <div class="profile-block">
            <h4 data-i18n="profile.interestsTitle">Interests</h4>
            <ul id="interests-list">
              <li><i class="fas fa-code"></i> <span data-i18n="profile.interests.0.text"></span></li>
              <li><i class="fas fa-robot"></i> <span data-i18n="profile.interests.1.text"></span></li>
              <li><i class="fas fa-microchip"></i> <span data-i18n="profile.interests.2.text"></span></li>
            </ul>
          </div>
          <div class="profile-block">
            <h4 data-i18n="profile.educationTitle">Education</h4>
            <div id="education-list">
              <div class="edu-item">
                <i class="fas fa-graduation-cap"></i>
                <div>
                  <strong data-i18n="profile.education.0.school"></strong><br>
                  <span data-i18n="profile.education.0.degree"></span><br>
                  <em class="text-sm text-muted" data-i18n="profile.education.0.year"></em>
                </div>
              </div>
            </div>
          </div>
          <div class="profile-block">
            <h4 data-i18n="sections.contact">Contact</h4>
            <ul class="contact-list">
              <li><i class="fas fa-envelope"></i> <a href="mailto:pengqixiao@email.ncu.edu.cn" data-i18n="contact.email"></a></li>
              <li><i class="fas fa-map-marker-alt"></i> <span data-i18n="contact.address"></span></li>
              <li><i class="fab fa-github"></i> <a href="https://github.com/pqxiao" target="_blank">github.com/pqxiao</a></li>
            </ul>
          </div>
        </div>

        <div class="profile-mini-cards" aria-label="Profile quick links">
          <a class="mini-link-card" href="https://www.robocon.org.cn/" target="_blank" rel="noopener noreferrer">
            <img class="mini-link-logo robocon-logo" src="assets/images/robocon-logo.png" alt="Robocon Logo" loading="lazy">
            <span>CURC-ROBOCON</span>
          </a>
          <a class="mini-link-card" href="https://space.bilibili.com/480643172" target="_blank" rel="noopener noreferrer">
            <img class="mini-link-logo" src="https://www.bilibili.com/favicon.ico" alt="Bilibili Logo" loading="lazy">
            <span>南昌大学机器人队</span>
          </a>
        </div>
      </div>
    </section>

    <!-- Projects -->
    <section id="projects" class="section-row">
      <div class="section-title">
        <h2 data-i18n="sections.projects">Projects</h2>
      </div>
      <div class="section-content gallery-grid" id="projects-grid">
      </div>
    </section>

    <!-- Experience -->
    <section id="experience" class="section-row">
      <div class="section-title">
        <h2 data-i18n="sections.experience">Experience</h2>
      </div>
      <div class="section-content" id="experience-list">
      </div>
    </section>

    <!-- Awards -->
    <section id="awards" class="section-row">
      <div class="section-title">
        <h2 data-i18n="sections.awards">Awards & Honors</h2>
      </div>
      <div class="section-content" id="awards-list">
      </div>
    </section>

    <!-- Gallery -->
    <section id="gallery" class="section-row">
      <div class="section-title">
        <h2 data-i18n="sections.gallery">Life & Photography</h2>
      </div>
      <div class="section-content gallery-grid" id="gallery-grid">
      </div>
    </section>

  </main>

  <footer class="site-footer">
    <div class="social-links" style="margin-bottom: 20px;">
      <a href="mailto:pqxiao@example.com" title="Email"><i class="fas fa-envelope"></i></a>
      <a href="https://github.com/pqxiao" target="_blank"><i class="fab fa-github"></i></a>
    </div>
    <p>&copy; 2024 Pengqi Xiao. All Rights Reserved.</p>
  </footer>

  <!-- Modal for Gallery -->
  <div class="modal-overlay" id="detail-modal">
    <div class="modal-container">
      <button class="modal-close" onclick="closeDetails()">&times;</button>
      <div id="modal-content-inject"></div>
    </div>
  </div>

  <script type="module">
    import { initLanguage } from './assets/js/i18n.js';
    import { setupTheme } from './assets/js/main.js';

    if(true) {
      initLanguage();
      setupTheme();
    }
    
    // Make closeDetails available globally since it's inline in HTML button
    window.closeDetails = function() {
      const modal = document.getElementById('detail-modal');
      if(modal) {
        modal.classList.remove('active');
        document.getElementById('modal-content-inject').innerHTML = '';
      }
    };
  </script>
</body>
</html>
